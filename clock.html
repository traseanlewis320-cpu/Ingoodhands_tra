<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
            font-family: 'Arial', sans-serif;
            color: white;
        }
        .clock {
            text-align: center;
            font-size: 24px;
        }
        .zone {
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="zone" id="utc">UTC: </div>
        <div class="zone" id="est">EST: </div>
        <div class="zone" id="cst">CST: </div>
        <div class="zone" id="mst">MST: </div>
        <div class="zone" id="pst">PST: </div>
        <div class="zone" id="gmt">GMT: </div>
        <div class="zone" id="ist">IST: </div>
        <div class="zone" id="jst">JST: </div>
        <div class="zone" id="aest">AEST: </div>
    </div>
    <script>
        function updateClocks() {
            const utc = new Date();
            document.getElementById('utc').innerText = 'UTC: ' + utc.toUTCString().slice(17, 25);
            document.getElementById('est').innerText = 'EST: ' + new Date(utc.setHours(utc.getHours() - 5)).toLocaleTimeString();
            document.getElementById('cst').innerText = 'CST: ' + new Date(utc.setHours(utc.getHours() - 1)).toLocaleTimeString();
            document.getElementById('mst').innerText = 'MST: ' + new Date(utc.setHours(utc.getHours() - 1)).toLocaleTimeString();
            document.getElementById('pst').innerText = 'PST: ' + new Date(utc.setHours(utc.getHours() - 1)).toLocaleTimeString();
            document.getElementById('gmt').innerText = 'GMT: ' + new Date(utc.setHours(utc.getHours() + 0)).toLocaleTimeString();
            document.getElementById('ist').innerText = 'IST: ' + new Date(utc.setHours(utc.getHours() + 5, utc.getMinutes() + 30)).toLocaleTimeString();
            document.getElementById('jst').innerText = 'JST: ' + new Date(utc.setHours(utc.getHours() + 9)).toLocaleTimeString();
            document.getElementById('aest').innerText = 'AEST: ' + new Date(utc.setHours(utc.getHours() + 10)).toLocaleTimeString();
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
